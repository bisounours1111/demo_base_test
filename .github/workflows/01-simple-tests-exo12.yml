name: Simple Tests Exo12

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'

      - name: Check Java version
        run: java -version

      - name: Check maven version
        run: mvn -version

      - name: Run maven tests
        run: mvn clean test
