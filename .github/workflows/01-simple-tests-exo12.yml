name: Simple Tests Exo12

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run maven tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exo12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check Java version
        run: java -version

      - name: Check maven version
        run: mvn -version

      - name: Run maven tests
        run: mvn clean verify

      - name: Publier les rapports de tests Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests-maven
          path: |
            exo12/target/surefire-reports/**
          if-no-files-found: warn

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-jacoco
          path: exo12/target/site/jacoco/**
          if-no-files-found: warn

      - name: Publier les rapports Cucumber BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-cucumber-bdd
          path: |
            exo12/target/cucumber-report.html
            exo12/target/cucumber-report.json
          if-no-files-found: warn
